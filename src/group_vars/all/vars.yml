server_ip: 192.168.1.200
server_user: truenas_admin
server_home: "/home/{{ server_user }}/services"
config_lan_network: 192.168.1.0/24

config_timezone: Etc/UTC
config_uid: 0
config_gid: 0

# Common

com_root_path: "{{ server_home }}/common"
com_config_path: "{{ com_root_path }}/config"
com_homarr_key: "{{ vault_arr_homarr_key }}"

# ARR Stack

arr_root_path: "{{ server_home }}/arr"
arr_config_path: "{{ arr_root_path }}/config"

arr_media_pool: /mnt/main-pool/media

arr_movies_path: "{{ arr_media_pool }}/movies"
arr_tv_path: "{{ arr_media_pool }}/tv-shows"
arr_download_path: "{{ arr_media_pool }}/torrents"
arr_transcode_path: "{{ arr_media_pool }}/transcode"

arr_plex_token: "{{ vault_arr_plex_token }}"
arr_tmm_password: "{{ vault_arr_tmm_password }}"

# Immich

imm_root_path: "{{ server_home }}/imm"
imm_config_path: "{{ imm_root_path }}/config"

imm_media_pool: /mnt/main-pool/pictures
imm_postgres_password: "{{ vault_imm_postgres_password }}"