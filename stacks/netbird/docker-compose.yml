services:
  netbird-client:
    container_name: netbird-client
    image: netbirdio/netbird:latest
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE
    devices:
      # Required when using userspace mode or when kernel module is not available
      - /dev/net/tun
    network_mode: host
    environment:
      - NB_SETUP_KEY=${NETBIRD_SETUP_KEY}
    volumes:
      - ${NETBIRD_CONFIG_PATH}:/var/lib/netbird
