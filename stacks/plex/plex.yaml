plex:
  TZ: Europe/Paris
  ix_certificate_authorities: {}
  ix_certificates: {}
  ix_context:
    app_name: plex
    is_install: false
    is_rollback: false
    is_update: false
    is_upgrade: true
    operation: UPGRADE
    scale_version: TrueNAS-25.04.0
  ix_volumes:
    config: /mnt/.ix-apps/app_mounts/plex/config
  labels: []
  network:
    dns_opts: []
    host_network: true
  plex:
    additional_envs: []
    allowed_networks:
      - 192.168.1.0/16
    claim_token: <SECRET>
    devices: []
    image_selector: plex_pass_image
  release_name: plex
  resources:
    gpus:
      kfd_device_exists: false
      nvidia_gpu_selection: {}
      use_all_gpus: true
    limits:
      cpus: 2
      memory: 4096
  run_as:
    group: 568
    user: 568
  storage:
    additional_storage: []
    config:
      ix_volume_config:
        acl_enable: false
        dataset_name: config
      type: ix_volume
    data:
      host_path_config:
        acl_enable: false
        path: /mnt/main-pool/media
      type: host_path
    logs:
      type: temporary
    transcode:
      type: temporary
