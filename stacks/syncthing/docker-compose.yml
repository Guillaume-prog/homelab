services:
  syncthing:
    image: syncthing/syncthing
    container_name: syncthing
    hostname: ${SYNCTHING_HOSTNAME}
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ${SYNCTHING_CONFIG_PATH}:/var/syncthing
      - ${CFG_PATH}:/mnt/config
    network_mode: host
    restart: unless-stopped
